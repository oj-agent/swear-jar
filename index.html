<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Swear Jar">
  <meta name="theme-color" content="#1a1a2e">
  <title>Swear Jar 💰</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a2e'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E💰%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --green: #0f9b58;
      --gold: #f4c542;
      --text: #eaeaea;
      --muted: #8892a4;
      --radius: 18px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 12px) env(safe-area-inset-right, 12px) env(safe-area-inset-bottom, 12px) env(safe-area-inset-left, 12px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 8px 8px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--gold); }

    .header-actions { display: flex; gap: 10px; }

    .icon-btn {
      background: var(--card);
      border: none;
      color: var(--text);
      border-radius: 12px;
      width: 42px; height: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn:active { background: #2a2a4e; }

    .sync-status {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      padding: 2px 0 8px;
      min-height: 20px;
    }
    .sync-status.syncing { color: var(--gold); }
    .sync-status.synced  { color: var(--green); }
    .sync-status.error   { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 4px 0;
    }

    .jar-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .jar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .jar-name {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .jar-total {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -1px;
    }

    .jar-stats {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .hit-btn {
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: transform 0.1s, opacity 0.15s;
      position: relative;
      overflow: hidden;
    }

    .hit-btn:active { transform: scale(0.97); }

    .hit-btn.free {
      background: linear-gradient(135deg, var(--green), #0d7a46);
      color: #fff;
    }

    .hit-btn.paid {
      background: linear-gradient(135deg, var(--accent), #c0392b);
      color: #fff;
    }

    .hit-btn .btn-label { flex: 1; text-align: left; }
    .hit-btn .btn-badge {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.85rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .free-clock {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      width: 50px; height: 50px;
      margin-top: -25px; margin-left: -25px;
      animation: ripple 0.5s linear;
      pointer-events: none;
    }

    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: #222;
      color: #fff;
      padding: 12px 22px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
      width: 100%;
      max-width: 480px;
      max-height: 90dvh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal h2 button {
      background: none; border: none; color: var(--muted);
      font-size: 1.5rem; cursor: pointer; line-height: 1;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .section-title {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 20px 0 10px;
    }

    .modal-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    .modal-btn:active { opacity: 0.8; }

    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: #2a2a4e; color: var(--text); }
    .btn-warning   { background: #e67e22; color: #fff; }
    .btn-danger    { background: #7f1d1d; color: #fff; }
    .btn-green     { background: var(--green); color: #fff; }

    .sheets-status {
      font-size: 0.75rem;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--bg);
      margin-bottom: 12px;
    }

    .log-preview {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--bg);
      border-radius: 8px;
      padding: 10px;
      max-height: 120px;
      overflow-y: auto;
      font-family: monospace;
    }

    .sheets-url-note {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    @media (min-width: 480px) {
      main { flex-direction: row; }
      .jar-card { flex: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>💰 Swear <span>Jar</span></h1>
  <div class="header-actions">
    <button class="icon-btn" id="syncBtn" title="Sync now">☁️</button>
    <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>
</header>

<div class="sync-status" id="syncStatus"></div>

<main>
  <div class="jar-card" id="card-robert">
    <div class="jar-header">
      <div>
        <div class="jar-name" id="name-robert">Robert</div>
        <div class="jar-stats" id="stats-robert">0 hits total</div>
      </div>
      <div class="jar-total" id="total-robert">$0</div>
    </div>
    <button class="hit-btn free" id="hit-robert" onclick="handleHit('robert', event)">
      <span class="btn-label">Hit!</span>
      <span class="btn-badge" id="badge-robert">FREE</span>
    </button>
    <div class="free-clock" id="clock-robert"></div>
  </div>

  <div class="jar-card" id="card-tingting">
    <div class="jar-header">
      <div>
        <div class="jar-name" id="name-tingting">Tingting</div>
        <div class="jar-stats" id="stats-tingting">0 hits total</div>
      </div>
      <div class="jar-total" id="total-tingting">$0</div>
    </div>
    <button class="hit-btn free" id="hit-tingting" onclick="handleHit('tingting', event)">
      <span class="btn-label">Hit!</span>
      <span class="btn-badge" id="badge-tingting">FREE</span>
    </button>
    <div class="free-clock" id="clock-tingting"></div>
  </div>
</main>

<div id="toast"></div>

<!-- Settings Modal -->
<div class="modal-backdrop" id="settingsModal" onclick="closeModalOnBackdrop(event)">
  <div class="modal">
    <h2>Settings ⚙️ <button onclick="closeSettings()">×</button></h2>

    <div class="form-group">
      <label>Person 1 Name</label>
      <input id="set-name-robert" type="text" placeholder="Robert">
    </div>
    <div class="form-group">
      <label>Person 2 Name</label>
      <input id="set-name-tingting" type="text" placeholder="Tingting">
    </div>
    <div class="form-group">
      <label>Per-hit amount ($)</label>
      <input id="set-amount" type="number" min="1" step="1" placeholder="10">
    </div>

    <button class="modal-btn btn-primary" onclick="saveSettings()">Save Names & Amount</button>

    <div class="section-title">Jar Management</div>

    <div class="form-group">
      <label>Set Person 1 total to ($)</label>
      <input id="set-total-robert" type="number" min="0" step="1" placeholder="Current value">
    </div>
    <div class="form-group">
      <label>Set Person 2 total to ($)</label>
      <input id="set-total-tingting" type="number" min="0" step="1" placeholder="Current value">
    </div>
    <button class="modal-btn btn-warning" onclick="setTotals()">Set Totals</button>
    <button class="modal-btn btn-danger" onclick="resetJar()">🗑️ Reset Both to $0</button>
    <button class="modal-btn btn-danger" onclick="clearLocalData()" style="margin-top:8px">🧹 Clear All Local Data</button>

    <div class="section-title">Google Sheets Sync</div>
    <div class="sheets-status" id="sheetsStatus">Not configured</div>
    <div class="form-group">
      <label>Apps Script Web App URL</label>
      <input id="set-sheets-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
      <div class="sheets-url-note">See SETUP.md for how to deploy. After updating the script, re-deploy as a <strong>new version</strong> to enable pull sync.</div>
    </div>
    <button class="modal-btn btn-green" onclick="saveSheetUrl()">Save & Test Sheets</button>

    <div class="section-title">Log</div>
    <div class="log-preview" id="logPreview">(no hits yet)</div>
    <button class="modal-btn btn-secondary" onclick="exportCSV()">📥 Export CSV</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────

const DEFAULT_STATE = {
  names: { robert: 'Robert', tingting: 'Tingting' },
  totals: { robert: 0, tingting: 0 },
  hitAmount: 10,
  firstHitToday: { robert: null, tingting: null }, // ISO timestamp of most recent free hit today (resets at local midnight)
  log: [], // { ts, person, amount, synced }
  sheetsUrl: ''
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem('swear-jar-state');
    if (raw) return { ...DEFAULT_STATE, ...JSON.parse(raw) };
  } catch(e) {}
  return { ...DEFAULT_STATE };
}

function saveState() {
  localStorage.setItem('swear-jar-state', JSON.stringify(state));
}

// ─── Person name → key mapping ────────────────────────────────────────────────

function getPersonKey(name) {
  if (!name) return null;
  // Exact match first
  if (name === state.names.robert)   return 'robert';
  if (name === state.names.tingting) return 'tingting';
  // Case-insensitive fallback
  const lower = name.toLowerCase();
  if (state.names.robert.toLowerCase()   === lower) return 'robert';
  if (state.names.tingting.toLowerCase() === lower) return 'tingting';
  return null;
}

// ─── Recompute totals + free-hit timer from log (log-driven state) ────────────

function recomputeFromLog() {
  const todayStr = new Date().toLocaleDateString();

  const totals        = { robert: 0, tingting: 0 };
  const lastFreeHitTs = { robert: null, tingting: null };

  for (const entry of state.log) {
    if (!entry.person || entry.person === 'SYSTEM') continue;
    const key = getPersonKey(entry.person);
    if (!key) continue;

    totals[key] += Number(entry.amount) || 0;

    if (Number(entry.amount) === 0) {
      // Track most recent free-hit timestamp per person
      if (!lastFreeHitTs[key] || entry.ts > lastFreeHitTs[key]) {
        lastFreeHitTs[key] = entry.ts;
      }
    }
  }

  state.totals = totals;

  // firstHitToday = most recent free-hit ts if it was TODAY (local calendar day), else null (free hit available)
  for (const key of ['robert', 'tingting']) {
    const ts = lastFreeHitTs[key];
    if (ts && new Date(ts).toLocaleDateString() === todayStr) {
      state.firstHitToday[key] = ts;
    } else {
      state.firstHitToday[key] = null;
    }
  }
}

// ─── 24h window logic ────────────────────────────────────────────────────────

function isFreeHitAvailable(person) {
  const ts = state.firstHitToday[person];
  if (!ts) return true;
  // Free hit resets at midnight (calendar-day boundary, local time)
  return new Date(ts).toLocaleDateString() !== new Date().toLocaleDateString();
}

function timeUntilReset(person) {
  const ts = state.firstHitToday[person];
  if (!ts) return null;
  if (isFreeHitAvailable(person)) return null;
  // Calculate ms until local midnight
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
  const diff = midnight.getTime() - now.getTime();
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return `${h}h ${m}m until midnight reset`;
}

// ─── Audio: cha-ching via Web Audio API ──────────────────────────────────────

let audioCtx = null;

function playChaChingSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const now = ctx.currentTime;

    const gainMaster = ctx.createGain();
    gainMaster.connect(ctx.destination);
    gainMaster.gain.setValueAtTime(0.0, now);
    gainMaster.gain.linearRampToValueAtTime(0.6, now + 0.01);
    gainMaster.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

    const osc1 = ctx.createOscillator();
    osc1.type = 'triangle';
    osc1.frequency.setValueAtTime(1800, now);
    osc1.frequency.exponentialRampToValueAtTime(900, now + 0.15);
    osc1.connect(gainMaster);
    osc1.start(now);
    osc1.stop(now + 0.3);

    const osc2 = ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(2600, now + 0.05);
    osc2.frequency.exponentialRampToValueAtTime(1400, now + 0.35);
    const gain2 = ctx.createGain();
    gain2.gain.setValueAtTime(0.3, now + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(now + 0.05);
    osc2.stop(now + 0.6);

    [0, 100, 200, 320].forEach((delayMs, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const freq = [1200, 1500, 1800, 2100][i];
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.15, now + delayMs/1000);
      g.gain.exponentialRampToValueAtTime(0.001, now + delayMs/1000 + 0.25);
      o.connect(g);
      g.connect(ctx.destination);
      o.start(now + delayMs/1000);
      o.stop(now + delayMs/1000 + 0.25);
    });
  } catch(e) {
    console.warn('Audio failed:', e);
  }
}

// ─── Hit logic ───────────────────────────────────────────────────────────────

function handleHit(person, event) {
  const isFree  = isFreeHitAvailable(person);
  const amount  = isFree ? 0 : state.hitAmount;

  // Ripple effect
  const btn = event.currentTarget;
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  const rect = btn.getBoundingClientRect();
  ripple.style.left = (event.clientX - rect.left) + 'px';
  ripple.style.top  = (event.clientY - rect.top) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  // Log the hit (synced: false → will be pushed on next sync)
  const logEntry = {
    ts:     new Date().toISOString(),
    person: state.names[person],
    amount,
    synced: false
  };
  state.log.push(logEntry);

  // Recompute totals + free-hit timer from full log (keeps single source of truth)
  recomputeFromLog();
  saveState();

  // Sound + toast
  if (amount > 0) {
    playChaChingSound();
    showToast(`+$${amount} added to ${state.names[person]}'s jar 💸`);
  } else {
    showToast(`Free hit used! (${state.names[person]}) 🆓`);
  }

  updateUI();
  syncBidirectional(); // push & pull
}

// ─── UI rendering ─────────────────────────────────────────────────────────────

function updateUI() {
  ['robert', 'tingting'].forEach(p => {
    const isFree = isFreeHitAvailable(p);
    const name   = state.names[p];
    const total  = state.totals[p];

    document.getElementById(`name-${p}`).textContent  = name;
    document.getElementById(`total-${p}`).textContent = `$${total}`;

    const hitCount = state.log.filter(e => getPersonKey(e.person) === p).length;
    document.getElementById(`stats-${p}`).textContent =
      `${hitCount} hit${hitCount !== 1 ? 's' : ''} total`;

    const btn   = document.getElementById(`hit-${p}`);
    const badge = document.getElementById(`badge-${p}`);

    if (isFree) {
      btn.className     = 'hit-btn free';
      badge.textContent = 'FREE';
      document.getElementById(`clock-${p}`).textContent = '';
    } else {
      btn.className     = 'hit-btn paid';
      badge.textContent = `$${state.hitAmount}`;
      document.getElementById(`clock-${p}`).textContent = timeUntilReset(p) || '';
    }
  });
}

function updateLogPreview() {
  const el = document.getElementById('logPreview');
  const hits = state.log.filter(e => e.person !== 'SYSTEM');
  if (hits.length === 0) { el.textContent = '(no hits yet)'; return; }
  const lines = hits.slice(-20).reverse().map(e => {
    const d    = new Date(e.ts);
    const date = d.toLocaleDateString();
    const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const amt  = e.amount === 0 ? 'FREE' : `$${e.amount}`;
    const flag = e.synced ? '' : ' *';
    return `${date} ${time}  ${e.person}  ${amt}${flag}`;
  });
  el.textContent = lines.join('\n') + (hits.some(e => !e.synced) ? '\n(* = not yet synced)' : '');
}

// ─── Toast ───────────────────────────────────────────────────────────────────

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Settings modal ──────────────────────────────────────────────────────────

function openSettings() {
  document.getElementById('set-name-robert').value    = state.names.robert;
  document.getElementById('set-name-tingting').value  = state.names.tingting;
  document.getElementById('set-amount').value         = state.hitAmount;
  document.getElementById('set-total-robert').value   = state.totals.robert;
  document.getElementById('set-total-tingting').value = state.totals.tingting;
  document.getElementById('set-sheets-url').value     = state.sheetsUrl || '';
  updateSheetsStatusEl();
  updateLogPreview();
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function closeModalOnBackdrop(e) {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
}

function saveSettings() {
  const n1  = document.getElementById('set-name-robert').value.trim()   || 'Robert';
  const n2  = document.getElementById('set-name-tingting').value.trim() || 'Tingting';
  const amt = parseInt(document.getElementById('set-amount').value) || 10;
  state.names.robert   = n1;
  state.names.tingting = n2;
  state.hitAmount      = amt;
  saveState();
  updateUI();
  showToast('Settings saved!');
  closeSettings();
}

function setTotals() {
  // Setting totals manually: add a synthetic adjustment entry to the log
  const newR = parseInt(document.getElementById('set-total-robert').value);
  const newT = parseInt(document.getElementById('set-total-tingting').value);
  const ts   = new Date().toISOString();

  if (!isNaN(newR) && newR >= 0) {
    const diff = newR - state.totals.robert;
    state.log.push({ ts, person: state.names.robert, amount: diff, note: 'manual-set', synced: false });
  }
  if (!isNaN(newT) && newT >= 0) {
    const ts2 = new Date(Date.now() + 1).toISOString(); // distinct ts
    const diff = newT - state.totals.tingting;
    state.log.push({ ts: ts2, person: state.names.tingting, amount: diff, note: 'manual-set', synced: false });
  }
  recomputeFromLog();
  saveState();
  updateUI();
  showToast('Totals updated!');
  closeSettings();
}

function clearLocalData() {
  if (!confirm('Clear ALL local data (log, totals, settings)? This removes everything stored on this device only. The Google Sheet is not affected.')) return;
  localStorage.removeItem('swearJarState');
  showToast('Local data cleared — reloading…');
  setTimeout(() => location.reload(), 1200);
}

function resetJar() {
  if (!confirm('Reset both jars to $0? This cannot be undone.')) return;
  const ts = new Date().toISOString();
  // Add negative entries that bring totals to 0, then recompute
  const adjR = -state.totals.robert;
  const adjT = -state.totals.tingting;
  state.log.push({ ts, person: state.names.robert, amount: adjR, note: 'reset', synced: false });
  state.log.push({ ts: new Date(Date.now() + 1).toISOString(), person: state.names.tingting, amount: adjT, note: 'reset', synced: false });
  state.firstHitToday = { robert: null, tingting: null };
  recomputeFromLog();
  saveState();
  updateUI();
  showToast('Jars reset to $0 🗑️');
  closeSettings();
}

// ─── Google Sheets bidirectional sync ─────────────────────────────────────────

let pendingSync = false;

/**
 * Full bidirectional sync:
 * 1. Push any unsynced local entries (POST, no-cors)
 * 2. Pull all entries from Sheets (GET, cors)
 * 3. Merge + deduplicate by ts
 * 4. Recompute totals + firstHitToday from merged log
 */
async function syncBidirectional() {
  if (!state.sheetsUrl) return;
  if (pendingSync) return;
  pendingSync = true;
  updateSyncStatus('syncing', '☁️ Syncing…');

  try {
    // ── Step 1: Push unsynced entries ────────────────────────────────────────
    const unsynced = state.log.filter(e => !e.synced && e.person !== 'SYSTEM');
    if (unsynced.length > 0) {
      try {
        await fetch(state.sheetsUrl, {
          method: 'POST',
          mode:   'no-cors',  // Apps Script POST requires no-cors
          headers: { 'Content-Type': 'text/plain' },
          body:   JSON.stringify(
            unsynced.map(e => ({ ts: e.ts, person: e.person, amount: e.amount }))
          )
        });
        // Mark as synced (no-cors → opaque response, assume success)
        const pushTs = new Set(unsynced.map(e => e.ts));
        state.log = state.log.map(e => pushTs.has(e.ts) ? { ...e, synced: true } : e);
      } catch(pushErr) {
        console.warn('Push failed:', pushErr);
        // Continue to try pull anyway
      }
    }

    // ── Step 2: Pull all entries ──────────────────────────────────────────────
    let remoteLog = [];
    try {
      const resp = await fetch(state.sheetsUrl, {
        method: 'GET',
        mode:   'cors'
      });
      if (resp.ok) {
        const data = await resp.json();
        if (data.status === 'ok' && Array.isArray(data.log)) {
          remoteLog = data.log;
        }
      }
    } catch(pullErr) {
      // GET CORS failed (older script without GET endpoint, or network)
      console.warn('Pull failed (script may need updating):', pullErr);
      // Still save whatever push we did
      saveState();
      updateUI();
      const unsyncedCount = state.log.filter(e => !e.synced && e.person !== 'SYSTEM').length;
      updateSyncStatus(
        unsyncedCount === 0 ? 'synced' : 'error',
        unsyncedCount === 0
          ? '✅ Pushed (update script to enable full sync)'
          : '⚠️ Push may have failed — check connection'
      );
      return;
    }

    // ── Step 3: Merge + deduplicate by ts ────────────────────────────────────
    const byTs = new Map();

    // Remote entries are already synced
    for (const entry of remoteLog) {
      if (!entry.ts) continue;
      byTs.set(entry.ts, {
        ts:     entry.ts,
        person: entry.person,
        amount: Number(entry.amount) || 0,
        synced: true
      });
    }

    // Local non-SYSTEM entries (don't overwrite remote copies)
    for (const entry of state.log) {
      if (!entry.ts || entry.person === 'SYSTEM') continue;
      if (!byTs.has(entry.ts)) {
        byTs.set(entry.ts, entry);
      } else {
        // Keep remote data; preserve local synced flag
        byTs.set(entry.ts, { ...byTs.get(entry.ts), synced: true });
      }
    }

    // Sort chronologically
    const merged = Array.from(byTs.values()).sort((a, b) => a.ts.localeCompare(b.ts));

    // Preserve SYSTEM entries from local log
    const systemEntries = state.log.filter(e => e.person === 'SYSTEM');
    state.log = [...merged, ...systemEntries].sort((a, b) => a.ts.localeCompare(b.ts));

    // ── Step 4: Recompute from merged log ─────────────────────────────────────
    recomputeFromLog();
    saveState();
    updateUI();

    const total = merged.filter(e => getPersonKey(e.person)).length;
    updateSyncStatus('synced', `✅ Synced — ${total} entries`);

  } catch(err) {
    console.error('Sync error:', err);
    updateSyncStatus('error', '⚠️ Sync failed');
  } finally {
    pendingSync = false;
    setTimeout(() => updateSyncStatus('', ''), 6000);
  }
}

async function saveSheetUrl() {
  const url = document.getElementById('set-sheets-url').value.trim();
  state.sheetsUrl = url;
  saveState();
  if (url) {
    document.getElementById('sheetsStatus').textContent = 'Testing…';
    try {
      const resp = await fetch(url, { method: 'GET', mode: 'cors' });
      const data = await resp.json();
      if (data.status === 'ok') {
        document.getElementById('sheetsStatus').textContent =
          '✅ Connected! GET sync enabled.';
      } else {
        document.getElementById('sheetsStatus').textContent =
          '⚠️ URL reached but returned unexpected response. Push-only mode.';
      }
    } catch(e) {
      // Could be old script version (no GET support), or CORS issue
      document.getElementById('sheetsStatus').textContent =
        '⚠️ Could not verify URL. Push may still work. Update script for full sync.';
    }
  } else {
    document.getElementById('sheetsStatus').textContent = 'Not configured';
  }
}

function updateSheetsStatusEl() {
  const el = document.getElementById('sheetsStatus');
  el.textContent = state.sheetsUrl
    ? `URL saved: ${state.sheetsUrl.slice(0, 50)}…`
    : 'Not configured';
}

function updateSyncStatus(cls, msg) {
  const el      = document.getElementById('syncStatus');
  el.className  = 'sync-status ' + (cls || '');
  el.textContent = msg || '';
}

// ─── CSV Export ──────────────────────────────────────────────────────────────

function exportCSV() {
  const rows = [['Timestamp', 'Person', 'Amount']];
  state.log
    .filter(e => e.person && e.person !== 'SYSTEM' && !e.note)
    .forEach(e => rows.push([e.ts, e.person, e.amount]));
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `swear-jar-log-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported!');
}

// ─── Online/offline status ───────────────────────────────────────────────────

function updateOnlineStatus() {
  if (!navigator.onLine) {
    updateSyncStatus('', '📴 Offline — changes saved locally');
  }
}

window.addEventListener('online',  () => {
  updateSyncStatus('', '');
  syncBidirectional(); // auto-sync when back online
});
window.addEventListener('offline', updateOnlineStatus);

// ─── Clock refresh ────────────────────────────────────────────────────────────

setInterval(updateUI, 60000);

// ─── PWA service worker ──────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(console.warn);
  });
}

// ─── Init ────────────────────────────────────────────────────────────────────

document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('syncBtn').addEventListener('click', () => {
  syncBidirectional();
  showToast('Syncing…');
});

updateUI();
updateOnlineStatus();

// Auto-sync on load so each device picks up remote state immediately
if (state.sheetsUrl) {
  syncBidirectional();
}
</script>
